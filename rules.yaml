shell_spawn:
  enabled: true
  severity: high
  shell_names: ["sh", "bash", "zsh"]
  allowed_parents: ["sh", "bash", "sshd", "systemd", "login", "su", "sudo", "MainThread"]

sensitive_files:
  enabled: true
  severity: critical
  paths:
    - /etc/shadow
    - /etc/gshadow
    - /etc/sudoers
  path_substrings:
    - ".ssh/"
    - "id_rsa"
    - "id_ed25519"
    - ".pem"
    - ".aws/"

readonly_writes:
  enabled: true
  severity: high
  protected_prefixes:
    - /usr/
    - /bin/
    - /sbin/
    - /lib/
    - /etc/

network_anomaly:
  enabled: true
  severity: medium
  allowed_ports: [80, 443, 53, 22]
